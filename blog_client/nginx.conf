# 1. HTTP 自动重定向到 HTTPS
server {
    listen 80;
    server_name localhost;

    # 允许客户端上传最大 100MB 的文件，解决 413 Request Entity Too Large 错误
    client_max_body_size 100M;

    return 301 https://$host$request_uri;
}

# 2. HTTPS 服务配置
server {
    listen 443 ssl;
    server_name localhost;

    # 证书文件路径（映射自主机的 ./certs 目录）
    ssl_certificate /etc/nginx/certs/server.pem; # 若您的证书文件是 .crt 后缀，请在此处修改为 server.crt
    ssl_certificate_key /etc/nginx/certs/server.key;

    # SSL 协议与安全策略优化配置
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
    ssl_prefer_server_ciphers on;

    # 允许客户端上传最大 100MB 的文件
    client_max_body_size 100M;

    # 处理 Vue 路由的历史模式 (History Mode)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 反向代理，将 /api 打头的请求全部转发给后端的 Docker 容器
    location /api/ {
        # 'backend' 是 docker-compose 中定义的服务名
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme; # 传递真实的协议类型 (https)
    }

    # 反向代理静态资源目录
    location /uploads/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
    }
}
