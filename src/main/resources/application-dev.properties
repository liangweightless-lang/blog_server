# Development Environment Configuration (Local)

# Local MySQL connection
spring.datasource.url=jdbc:mysql://localhost:3306/blog_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Show SQL logs in development
logging.level.com.wtls.blog_server.mapper=DEBUG

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# 如果数据库已经有表，开启此项以建立基准版本
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1.0
