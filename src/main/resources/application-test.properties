# Production Environment Configuration (Formal Cloud Environment)

# Formal MySQL connection
# Note: 'mysql_server' will be the name of the Docker container we link to
spring.datasource.url=jdbc:mysql://mysql_server:3306/blog_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=ProductionStrongPassword
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Reduce log level in production to save disk space
logging.level.root=WARN
logging.level.com.wtls.blog_server=INFO

# Flyway Configuration for Production
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1.0
spring.flyway.validate-on-migrate=false

# Alipay Sandbox Config
alipay.appId=9021000164610865
alipay.
alipay.
alipay.gatewayUrl=https://openapi-sandbox.dl.alipaydev.com/gateway.do
alipay.notifyUrl=http://caibread.com/api/pay/alipay/notify

# Base URL for file uploads and images (Empty for relative paths in test env)
app.file.base-url=
